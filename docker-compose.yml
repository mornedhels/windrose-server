services:
  windrose:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
      args:
        WINE_BRANCH: staging
    image: mornedhels/windrose-server:dev-wine-staging
    container_name: windrose
    hostname: windrose
    restart: unless-stopped
    stop_grace_period: 90s
    ports:
      - "7777:7777"
      - "7777:7777/udp"
    volumes:
      - ./game:/opt/windrose
    devices:
      - /dev/ntsync:/dev/ntsync
    environment:
      - SERVER_NAME=MornedhelsTest
      - PUID=4711
      - PGID=4711
      - UPDATE_CRON=*/30 * * * *
      - log_level=50
